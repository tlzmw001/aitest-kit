# AIAutoTest 项目配置
target:
  http_base_url: "http://localhost:8000"
  grpc_host: "localhost"
  grpc_port: 50051
  redis_url: "redis://localhost:6379/0"

execution:
  timeout: 10.0
  retry_count: 0
  parallel: false

workspace:
  plans_dir: "test_workspace/plans"
  cases_dir: "test_workspace/cases"
  suites_dir: "test_workspace/suites"
  results_dir: "test_workspace/results"
  reports_dir: "test_workspace/reports"
