# 项目级 codegen 配置。
# 换项目时只改这个文件和各模块 codegen_profile，不改 emitter engine。

helper_import: "from test_workspace.tests.helpers import http as http_helper"
grpc_helper_import: "from test_workspace.tests.helpers import grpc_ops"
api_path: "/api/v1/recommend"
helper_call: "http_helper.post"
grpc_helper_call: "grpc_ops.recommend"

var_map:
  s: 'resp["results"][0]["score"]'
  cal: 'resp["results"][0]["calibrated_score"]'

module_abbrevs:
  calibration: cal
  ab_experiment: ab
  ab_service: abs
  feature_scoring: feat
  issuance: issue
  logging: log
  rough_ranking: rank
  scene_routing: route
  validation_ratelimit: val
  e2e: e2e

named_templates:
  - piecewise_cascade
  - piecewise_only
  - skip

module_types:
  standard_recommend:
    description: "标准推荐接口模块"
  multi_endpoint:
    description: "多端点服务模块"
    requires: [case_bodies]
  subprocess_capture:
    description: "需要隔离进程捕获输出"
    requires: [case_bodies]
  isolated_service:
    description: "需要隔离服务实例"
    requires: [case_bodies]

builtin_assertion_rules:
  - name: status_code
    regex: '^response\.(?:body\.)?code\s*==\s*(?P<value>\d+)'
    template: 'assert resp["code"] == {value}'
  - name: http_status_code
    regex: '^response\.status_code\s*==\s*(?P<value>\d+)'
    template: 'assert resp.status_code == {value}'
  - name: http_status_code_short
    regex: '^status_code\s*==\s*(?P<value>\d+)'
    template: 'assert resp.status_code == {value}'
  - name: full_body
    regex: '^response\.body\s*==\s*(?P<value>.+)'
    template: 'assert resp == {value}'
  - name: coupon_null
    regex: '^(?:response\.body\.)?coupon\s*==\s*null$'
    template: 'assert resp["coupon"] is None'
  - name: coupon_top
    regex: '^(?=.*coupon\.item_id)(?=.*top_result).*$'
    template: 'assert resp["coupon"]["item_id"] == max(resp["results"], key=lambda r: r["score"])["item_id"]'
  - name: coupon_top_max
    regex: '^(?=.*coupon)(?=.*item_id)(?=.*max).*$'
    template: 'assert resp["coupon"]["item_id"] == max(resp["results"], key=lambda r: r["score"])["item_id"]'
  - name: set_match
    regex: '^set\(response\.(?P<path>.+?)\)\s*==\s*(?P<expected>\{.+\})$'
    template: 'assert {result_set:path} == {expected}'
  - name: length
    regex: '^len\((?P<expr>.+?)\)\s*==\s*(?P<n>\d+)$'
    template: 'assert len({expr}) == {n}'
  - name: linear_cal_with_b
    regex: '^cal\s*==\s*round\(clamp\((?P<k>[0-9.]+)\s*\*\s*s\s*\+\s*(?P<b>[0-9.]+)\)\s*,\s*4\)'
    template: 'assert cal == pytest.approx(max(0, min(1, {k} * s + {b})), abs=1e-4)'
  - name: linear_cal_no_b
    regex: '^cal\s*==\s*round\(clamp\((?P<k>[0-9.]+)\s*\*\s*s\)\s*,\s*4\)'
    template: 'assert cal == pytest.approx(max(0, min(1, {k} * s)), abs=1e-4)'
  - name: no_cal
    regex: '^cal\s*==\s*s\b.*$'
    template: 'assert cal == pytest.approx(s)'
  - name: comparison
    regex: '^response\.(?:body\.)?(?P<path>\S+)\s*(?P<op>>=|<=|>|<)\s*(?P<value>.+)$'
    template: 'assert {response_path:path} {op} {value}'
  - name: field_equality
    regex: '^response\.(?:body\.)?(?P<path>\S+)\s*==\s*(?P<value>.+)$'
    template: 'assert {response_path:path} == {value}'
