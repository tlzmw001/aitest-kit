schema_version: 0.1
case_id: TC-SCORE-002
title: external=1 时 ScoringClient 只走外部 HTTP 路径
source_review: review.md
priority: P1
type: business
knowledge_refs:
  - L1/feature_scoring

case_facts:
  route:
    external: 1
    expected_path: external_http
    forbidden_path: internal_grpc
  request:
    request_id: req-score-002
    user_id: u_external_route
    scene_id: 1001
    user_features:
      is_member: "true"
    context_features:
      channel: ad
    items:
      - item_id: COUPON_ACT_001
        features:
          popularity: 0.4
          coupon_type: discount
          value: 80
          min_spend: 5000
          expire_days: 3
  expected:
    R1:
      summary: only external HTTP scoring path is called
      observable: _score_external_http called once with request payload
    R2:
      summary: internal gRPC scoring path is not called
      observable: _score_internal_grpc not called
    R3:
      summary: result is returned from external HTTP scoring path
      observable: result contains COUPON_ACT_001 with score 0.46

execution_contract:
  subject:
    module: coupon_system.services.scoring_client
    class: ScoringClient
    method: score
  arrange:
    instantiate:
      class: ScoringClient
      kwargs:
        host: localhost
        port: 50052
        external_host: localhost
        external_port: 50053
    test_doubles:
      - target: client._score_external_http
        kind: patch_object
        return_value:
          - type: ItemScore
            item_id: COUPON_ACT_001
            score: 0.46
      - target: client._score_internal_grpc
        kind: patch_object
        monitor_only: true
  act:
    call: client.score
    kwargs_ref: case_facts.request
    extra_kwargs:
      external: 1
  assertions:
    - id: A1
      verifies: R3
      kind: result_equals
      expected:
        - type: ItemScore
          item_id: COUPON_ACT_001
          score: 0.46
    - id: A2
      verifies: R1
      kind: called_once_with
      target: client._score_external_http
      kwargs_ref: case_facts.request
    - id: A3
      verifies: R2
      kind: not_called
      target: client._score_internal_grpc

consistency:
  review_expectation_ids:
    - R1
    - R2
    - R3
  assertion_ids:
    - A1
    - A2
    - A3
  assertion_to_expectation:
    A1: R3
    A2: R1
    A3: R2
