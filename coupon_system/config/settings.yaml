# 优惠券策略系统配置

# 限流配置
rate_limit:
  enabled: true
  max_qps: 1000
  per_user_qps: 10
  window_seconds: 1

# 兜底配置
fallback:
  enabled: true
  on_scoring_timeout:
    action: "allow"
    default_score: 0.5
  on_scoring_unavailable:
    action: "allow"
    default_score: 0.3

# 打分服务配置
scoring_service:
  host: "localhost"
  port: 50052
  timeout: 2.0
  enabled: true

# 外部打分服务配置（HTTP）
external_scoring_service:
  host: "localhost"
  port: 50053
  timeout: 2.0
  enabled: true
  path: "/score"
  user_id_salt: "coupon_external_uid_salt"

# Redis 配置
redis:
  url: "redis://localhost:6379/0"
  key_prefix: "coupon:"
  stock_ttl: 86400
  user_claim_ttl: 604800

# 用户特征列表（从 Redis 读取的特征名）
user_feature_keys:
  - "gender"
  - "age"
  - "total_spend"
  - "purchase_frequency"
  - "register_days"
  - "is_new_user"
  - "is_member"

# item 特征文件路径（相对于 coupon_system/ 目录）
item_feature_file: "data/item_features.tsv"
