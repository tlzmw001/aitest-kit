# AITest 工作区配置
# 所有路径相对于工作区根目录

paths:
  knowledge_dir: test_workspace/knowledge
  test_spec: test_workspace/knowledge/TEST_SPEC.md
  l0_architecture: test_workspace/knowledge/L0_system_architecture.md
  cases_dir: test_workspace/cases
  generated_dir: test_workspace/tests/generated
  fixtures_dir: test_workspace/tests/fixtures
  reports_dir: test_workspace/reports
  results_dir: test_workspace/results
  docs_dir: docs
  refs_dir: aitest_config/refs
  project_config: aitest_config/project_config.yaml

service:
  language: python
  frameworks: []
  endpoints:
    http_base_url: ${HTTP_BASE_URL}
    grpc_target: ${GRPC_TARGET}

protocols:
  primary: http
  secondary: grpc
  grpc_identifier: "协议：gRPC"

known_limitations: []
